apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: app
  labels:
    app: app
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: app
---
# Headless service for stateful workloads or direct pod access
apiVersion: v1
kind: Service
metadata:
  name: app-headless
  namespace: app
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8000
      targetPort: http
  selector:
    app: app
