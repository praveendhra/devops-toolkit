apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: app
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        spec:
          serviceAccountName: app-sa
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  pg_dump $DATABASE_URL | gzip > /backup/db-$(date +%Y%m%d).sql.gz
                  aws s3 cp /backup/db-$(date +%Y%m%d).sql.gz s3://$BACKUP_BUCKET/daily/
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: database-url
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backup
              emptyDir: {}
