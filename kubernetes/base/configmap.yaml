apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: app
data:
  redis-url: "redis://redis-master.cache.svc.cluster.local:6379/0"
  log-level: "INFO"
  cors-origins: "https://app.example.com,https://admin.example.com"
  max-connections: "100"
  cache-ttl: "300"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: app
data:
  nginx.conf: |
    upstream backend {
        server app:8000;
    }
    server {
        listen 80;
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
